version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - zoom-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - zoom-network
    depends_on:
      - backend

networks:
  zoom-network:
    driver: bridge
